<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Drop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 32px;
    }

    #drop-zone {
      width: 100%;
      max-width: 640px;
      border: 2px dashed #333;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: #555;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    #drop-zone.drag-over {
      border-color: #5b8dee;
      background: rgba(91, 141, 238, 0.05);
      color: #5b8dee;
    }

    #drop-zone span {
      display: block;
      font-size: 2rem;
      margin-bottom: 12px;
    }

    #input-row {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 640px;
      margin-bottom: 32px;
    }

    #url-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #url-input:focus { border-color: #5b8dee; }

    #add-btn {
      background: #5b8dee;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    #add-btn:hover { background: #4a7be0; }

    #links-container {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 10px;
      padding: 12px 14px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .link-favicon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      flex-shrink: 0;
      background: #2a2a2a;
    }

    .link-info {
      flex: 1;
      overflow: hidden;
    }

    .link-title {
      font-size: 0.85rem;
      color: #c0c0c0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-url {
      font-size: 0.75rem;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-open {
      color: #5b8dee;
      text-decoration: none;
      font-size: 0.8rem;
      flex-shrink: 0;
      padding: 4px 10px;
      border: 1px solid #2a3a5a;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .link-open:hover { background: rgba(91,141,238,0.12); }

    .link-delete {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .link-delete:hover { color: #e05b5b; }

    #empty-msg {
      color: #444;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h1>Link Drop</h1>

  <div id="drop-zone">
    <span>🔗</span>
    Drop a link here, or paste a URL below
  </div>

  <div id="input-row">
    <input id="url-input" type="url" placeholder="https://..." />
    <button id="add-btn">Add</button>
  </div>

  <div id="links-container">
    <p id="empty-msg">No links yet.</p>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const urlInput = document.getElementById('url-input');
    const addBtn   = document.getElementById('add-btn');
    const container = document.getElementById('links-container');
    const emptyMsg  = document.getElementById('empty-msg');

    let links = JSON.parse(localStorage.getItem('dropped-links') || '[]');
    renderAll();

    // --- Drag & drop ---
    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const text = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain');
      if (text) addLink(text.trim());
    });

    // --- Manual input ---
    addBtn.addEventListener('click', () => {
      const val = urlInput.value.trim();
      if (val) { addLink(val); urlInput.value = ''; }
    });

    urlInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') addBtn.click();
    });

    // --- Paste anywhere ---
    document.addEventListener('paste', e => {
      const text = e.clipboardData.getData('text/plain').trim();
      if (text.startsWith('http://') || text.startsWith('https://')) {
        addLink(text);
      }
    });

    function addLink(raw) {
      let url;
      try {
        url = new URL(raw.startsWith('http') ? raw : 'https://' + raw);
      } catch {
        alert('Not a valid URL: ' + raw);
        return;
      }
      const entry = { url: url.href, id: Date.now() };
      links.unshift(entry);
      save();
      renderAll();
    }

    function removeLink(id) {
      links = links.filter(l => l.id !== id);
      save();
      renderAll();
    }

    function save() {
      localStorage.setItem('dropped-links', JSON.stringify(links));
    }

    function renderAll() {
      // clear existing cards
      container.querySelectorAll('.link-card').forEach(el => el.remove());
      emptyMsg.style.display = links.length ? 'none' : 'block';

      links.forEach(entry => {
        const card = document.createElement('div');
        card.className = 'link-card';

        const urlObj = new URL(entry.url);
        const favicon = `https://www.google.com/s2/favicons?domain=${urlObj.hostname}&sz=32`;

        card.innerHTML = `
          <img class="link-favicon" src="${favicon}" alt="" onerror="this.style.visibility='hidden'" />
          <div class="link-info">
            <div class="link-title">${urlObj.hostname}${urlObj.pathname !== '/' ? urlObj.pathname : ''}</div>
            <div class="link-url">${entry.url}</div>
          </div>
          <a class="link-open" href="${entry.url}" target="_blank" rel="noopener">Open</a>
          <button class="link-delete" title="Remove">✕</button>
        `;

        card.querySelector('.link-delete').addEventListener('click', () => removeLink(entry.id));
        container.appendChild(card);
      });
    }
  </script>
</body>
</html>
